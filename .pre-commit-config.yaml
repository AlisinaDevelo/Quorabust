repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - numpy>=1.24
          - pandas>=2.0
          - scikit-learn>=1.3
          - xgboost>=2.0
        args: [--config-file=pyproject.toml, src/quorabust]
        pass_filenames: false
