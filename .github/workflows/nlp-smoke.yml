name: NLP smoke

on:
  workflow_dispatch:

jobs:
  embedding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade "pip>=26" && pip install -e ".[dev,nlp]"
      - name: Pytest embedding module
        run: pytest -q tests/test_embedding_features.py --tb=short
